name: Genealogy Search

on:
  workflow_dispatch:
  schedule:
    - cron: "0 8 * * *"

jobs:
  search:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm install

      - name: Doctor
        run: npm run doctor

      - name: Run genealogy web queue
        run: npm run search:web:pdf:queue:ci
